name: Build and Release

on:
  push:
    tags:
      - 'v*' # Trigger on any tag starting with "v" (e.g., v2.2.0)

jobs:
  build-mac:
    name: Build macOS App
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pywebview

      - name: Build Application
        run: |
          chmod +x Compilar_Mac_App.sh
          ./Compilar_Mac_App.sh

      - name: Zip App Bundle
        run: |
          cd dist
          zip -r FreePTX_Mac.zip FreePTX.app

      - name: Upload Mac Asset
        uses: softprops/action-gh-release@v1
        with:
          files: dist/FreePTX_Mac.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    name: Build Windows Executable
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pywebview

      - name: Build Application
        run: |
          .\Compilar_Windows_Exe.bat

      - name: Zip Windows App
        run: |
          Compress-Archive -Path dist\FreePTX\* -DestinationPath dist\FreePTX_Windows.zip

      - name: Upload Windows Asset
        uses: softprops/action-gh-release@v1
        with:
          files: dist/FreePTX_Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
