name: Build and Release

on:
  push:
    tags:
      - 'v*' # Trigger on any tag starting with "v" (e.g., v2.2.0)
      - '*.*.*' # Fallback for when the user forgets the 'v' (e.g., 2.3.1)

permissions:
  contents: write

jobs:
  build-mac:
    name: Build macOS App
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pywebview

      - name: Inject Dynamic Version
        run: |
          python -c "import re; v='${{ github.ref_name }}'; c=open('app.py','r',encoding='utf-8').read(); open('app.py','w',encoding='utf-8').write(re.sub(r'APP_VERSION = \".*?\"', 'APP_VERSION = \"'+v+'\"', c)); c=open('index.html','r',encoding='utf-8').read(); open('index.html','w',encoding='utf-8').write(re.sub(r'v\d+\.\d+\.\d+', v, c))"

      - name: Build Application
        run: |
          chmod +x Compilar_Mac_App.sh
          ./Compilar_Mac_App.sh

      - name: Create DMG Disk Image
        run: |
          brew install create-dmg
          cd dist
          create-dmg \
            --volname "FreePTX Installer" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "FreePTX.app" 150 190 \
            --hide-extension "FreePTX.app" \
            --app-drop-link 450 190 \
            "FreePTX_Mac.dmg" \
            "FreePTX.app"

      - name: Extract Release Notes
        run: |
          python -c "import re; content=open('CHANGELOG.md','r',encoding='utf-8').read(); m=re.search(r'(##\s*v[\d\.]+.*?)(?=\n##\s*v[\d\.]+|\Z)', content, re.DOTALL); open('release_notes.txt','w',encoding='utf-8').write(m.group(1)) if m else None"

      - name: Upload Mac Asset
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ github.ref_name }}
          body_path: release_notes.txt
          files: dist/FreePTX_Mac.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    name: Build Windows Executable
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pywebview

      - name: Inject Dynamic Version
        run: |
          python -c "import re; v='${{ github.ref_name }}'; c=open('app.py','r',encoding='utf-8').read(); open('app.py','w',encoding='utf-8').write(re.sub(r'APP_VERSION = \".*?\"', 'APP_VERSION = \"'+v+'\"', c)); c=open('index.html','r',encoding='utf-8').read(); open('index.html','w',encoding='utf-8').write(re.sub(r'v\d+\.\d+\.\d+', v, c))"

      - name: Build Application
        run: |
          .\Compilar_Windows_Exe.bat

      - name: Zip Windows App
        run: |
          Compress-Archive -Path dist\FreePTX\* -DestinationPath dist\FreePTX_Windows.zip

      - name: Extract Release Notes
        run: |
          python -c "import re; content=open('CHANGELOG.md','r',encoding='utf-8').read(); m=re.search(r'(##\s*v[\d\.]+.*?)(?=\n##\s*v[\d\.]+|\Z)', content, re.DOTALL); open('release_notes.txt','w',encoding='utf-8').write(m.group(1)) if m else None"

      - name: Upload Windows Asset
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ github.ref_name }}
          body_path: release_notes.txt
          files: dist/FreePTX_Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
